<!-- FORCE_HTML_MIME 强制网页解析标记，解决微信源码裸奔bug -->
<!DOCTYPE html>
<html lang="zh-CN">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生日礼物选择</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
body{background:#f7f8fa;padding:20px 16px;}
.page-title{text-align:center;font-size:24px;color:#222;margin-bottom:24px;font-weight:600;}
.gift-card{background:#fff;border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.gift-name{font-size:17px;font-weight:600;color:#111;margin-bottom:8px;}
.gift-source{font-size:13px;color:#888;margin-bottom:14px;word-break:break-all;}
.btn-group{display:flex;gap:10px;}
button{flex:1;padding:11px 0;border-radius:10px;border:none;font-size:15px;cursor:pointer;}
.btn-open{background:#e64340;color:#fff;}
.btn-copy{background:#f0f2f5;color:#333;}
.divider{height:1px;background:#eee;margin:28px 0;}
.custom-box{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.custom-title{font-size:17px;font-weight:600;margin-bottom:12px;}
#customUrl{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:14px;outline:0;}
.tip-text{font-size:12px;color:#999;margin-top:8px;line-height:1.5;}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;display:none;z-index:999;}
</style>
<body>
<h1 class="page-title">🎁 生日礼物挑选</h1>
<div class="gift-card">
<div class="gift-name">日版deck OLED掌机512G现货</div>
<div class="gift-source">京东链接：https://3.jd.hk/101v2-Na</div>
<div class="btn-group">
<button class="btn-open" data-link="https://3.jd.hk/101v2-Na">直接打开链接</button>
<button class="btn-copy" data-link="https://3.jd.hk/101v2-Na">复制链接</button>
</div>
</div>
<div class="gift-card">
<div class="gift-name">三星27英寸FastIPS双模显示器</div>
<div class="gift-source">京东链接：https://3.cn/2Ur-fX8k?jkl=@BF1CD1bsf7BO@ CA1331</div>
<div class="btn-group">
<button class="btn-open" data-link="https://3.cn/2Ur-fX8k?jkl=@BF1CD1bsf7BO@ CA1331">直接打开链接</button>
<button class="btn-copy" data-link="https://3.cn/2Ur-fX8k?jkl=@BF1CD1bsf7BO@ CA1331">复制链接</button>
</div>
</div>
<div class="divider"></div>
<div class="custom-box">
<div class="custom-title">自定义其他礼物链接</div>
<input id="customUrl" placeholder="粘贴你的礼物商品链接">
<div class="btn-group">
<button class="btn-open" id="customOpen">打开自定义链接</button>
<button class="btn-copy" id="customCopy">复制自定义链接</button>
</div>
<p class="tip-text">提示：微信内京东链接会拦截，复制后用浏览器打开</p>
</div>
<div class="toast" id="toast">链接已复制</div>
<script>
function copyText(text){return new Promise((resolve,reject)=>{if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(text).then(resolve).catch(reject);}else{const t=document.createElement('textarea');t.value=text;t.style.position='fixed';t.style.left='-9999px';document.body.appendChild(t);t.select();t.setSelectionRange(0,text.length);const ok=document.execCommand('copy');document.body.removeChild(t);ok?resolve():reject();}})}
function showToast(msg){const t=document.getElementById('toast');t.innerText=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1500);}
function openLink(u){window.location.href=u;}
document.querySelectorAll('.btn-open').forEach(b=>{b.onclick=()=>{let l=b.dataset.link;if(l)openLink(l);}});
document.querySelectorAll('.btn-copy').forEach(b=>{b.onclick=async()=>{let l=b.dataset.link;if(!l)return;try{await copyText(l);showToast('复制成功，切换浏览器打开');}catch(e){showToast('复制失败，请长按链接手动复制');}}});
const ipt=document.getElementById('customUrl');
document.getElementById('customOpen').onclick=()=>{let v=ipt.value.trim();if(!v)return showToast('请输入商品链接');openLink(v);};
document.getElementById('customCopy').onclick=async()=>{let v=ipt.value.trim();if(!v)return showToast('请输入商品链接');await copyText(v);showToast('自定义链接复制完成');};
</script>
</body>
</html>
